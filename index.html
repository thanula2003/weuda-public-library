<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>වෑඋඩ මහජන පුස්තකාලය | Weuda Public Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-nav">
        <div class="council-info">
            <img src="./img/logo.jpg" alt="Logo">
            <span data-key="council"></span>
        </div>
        <div class="lang-switch">
            <button onclick="setLang('si')" id="btn-si" class="active">සිංහල</button>
            <button onclick="setLang('en')" id="btn-en">English</button>
            <button onclick="setLang('ta')" id="btn-ta">தமிழ்</button>
        </div>
    </div>

    <section class="library-hero">
        <div class="book-rack-panel">
            <h1 class="library-name" data-key="libraryName"></h1>
            <p style="color: white; letter-spacing: 2px;" data-key="libraryNameSub"></p>
        </div>
    </section>

    <section class="vision-section">
        <div class="vision-title" data-key="visionTitle"></div>
        <div class="vision-phrase" data-key="visionPhrase"></div>
    </section>

    <section class="vision-section">
        <div class="vision-title" data-key="missionTitle"></div>
        <div class="vision-phrase" style="font-size:1.1rem; max-width:800px; margin:auto; line-height:1.8;" data-key="missionText"></div>
    </section>

    <!-- Stats Ribbon -->
    <section class="stats-ribbon">
        <div class="stat-item">
            <span class="stat-number" data-target="15293" data-suffix="+">0</span>
            <span class="stat-label" data-key="statBooks"></span>
        </div>
        <div class="stat-divider">✦</div>
        <div class="stat-item">
            <span class="stat-number" data-target="2638" data-suffix="+">0</span>
            <span class="stat-label" data-key="statMembers"></span>
        </div>
        <div class="stat-divider">✦</div>
        <div class="stat-item">
            <span class="stat-number" data-target="52">0</span>
            <span class="stat-label" data-key="statYears"></span>
        </div>
    </section>

    <!-- History Section -->
    <section style="background: #2a1b0a; padding: 60px 20px; border-top: 4px solid var(--gold); border-bottom: 4px solid var(--gold);">
        <div style="max-width: 900px; margin: auto;">
            <h2 style="text-align:center; color: var(--gold); font-size: 2rem; margin-bottom: 10px; letter-spacing: 2px;" data-key="historyTitle"></h2>
            <div style="width: 60px; height: 3px; background: var(--gold); margin: 0 auto 40px;"></div>
            <div id="history-paragraphs" style="color: #e8d8c0; font-size: 1.05rem; line-height: 2; text-align: center;"></div>
            <div style="margin-top: 40px; border-top: 1px solid var(--gold); padding-top: 20px; text-align: right; color: var(--gold); font-style: italic;">
                <span data-key="historyAuthor"></span>
            </div>
        </div>
    </section>

    <div class="panel-title" style="margin-top: 50px;" data-key="booksTitle"></div>
    <div class="panel-container">
        <div id="books-panel" class="marquee-wrapper"></div>
    </div>

    <div class="panel-title" data-key="galleryTitle"></div>
    <div class="panel-container" style="background: #e2d1c3;">
        <div id="img-panel" class="marquee-wrapper" style="animation-direction: reverse; align-items: center;"></div>
    </div>

    <!-- Google Docs Viewer -->
    <section style="background: var(--parchment); padding: 40px 20px; border-top: 4px solid var(--gold); border-bottom: 4px solid var(--gold);">
        <div style="max-width: 900px; margin: auto;">
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:24px;">
                <button onclick="showDoc(1)" id="doc-btn-1" style="
                    background: var(--gothic-black);
                    color: var(--gold);
                    border: 2px solid var(--gold);
                    padding: 8px 22px;
                    font-family: 'Times New Roman', serif;
                    font-size: 0.9rem;
                    letter-spacing: 1px;
                    cursor: pointer;
                    transition: 0.3s;
                    border-radius: 3px;
                " onmouseover="this.style.background='var(--gold)';this.style.color='var(--gothic-black)'"
                   onmouseout="if(activeDoc!==1){this.style.background='var(--gothic-black)';this.style.color='var(--gold)'}">
                    📄 වෑඋඩ මහජන පුස්තකාලය ශ්‍රේණිගත කිරීමට අදාළ තොරතුරු
                </button>
                <button onclick="showDoc(2)" id="doc-btn-2" style="
                    background: var(--gothic-black);
                    color: var(--gold);
                    border: 2px solid var(--gold);
                    padding: 8px 22px;
                    font-family: 'Times New Roman', serif;
                    font-size: 0.9rem;
                    letter-spacing: 1px;
                    cursor: pointer;
                    transition: 0.3s;
                    border-radius: 3px;
                " onmouseover="this.style.background='var(--gold)';this.style.color='var(--gothic-black)'"
                   onmouseout="if(activeDoc!==2){this.style.background='var(--gothic-black)';this.style.color='var(--gold)'}">
                    📄 පුස්තකාල උපදේශක කමිටු වාර්තා ගොනුව
                </button>
            </div>
            <iframe id="doc-frame"
                src=""
                style="width:100%; height:700px; border: 5px solid var(--deep-wood); background: white; display:none;"
                frameborder="0" allowfullscreen></iframe>
        </div>
    </section>
    <script>
        var activeDoc = null;
        var docUrls = {
            1: 'https://docs.google.com/document/d/e/2PACX-1vT2sdeSpe-1TQYp-XY4ihk1TvWeajJH0t-sFo604hOZvCiKuohulyNGO4zqBT58wEvPMoWoJzbBdSmN/pub?embedded=true',
            2: 'https://docs.google.com/document/d/e/2PACX-1vR99i4Mjq-IKFIHPODi84ywRWJewCC02RWucUlz6RjM_Iyii4SS6YKEBLsBDrTbVLCY_VHmBrCnr11O/pub?embedded=true'
        };
        function showDoc(n) {
            var frame = document.getElementById('doc-frame');
            if (activeDoc === n) {
                // Toggle off if same button clicked again
                activeDoc = null;
                frame.style.display = 'none';
                frame.src = '';
                [1,2].forEach(function(i) {
                    var btn = document.getElementById('doc-btn-' + i);
                    btn.style.background = 'var(--gothic-black)';
                    btn.style.color = 'var(--gold)';
                });
                return;
            }
            activeDoc = n;
            frame.src = docUrls[n];
            frame.style.display = 'block';
            [1,2].forEach(function(i) {
                var btn = document.getElementById('doc-btn-' + i);
                if (i === n) {
                    btn.style.background = 'var(--gold)';
                    btn.style.color = 'var(--gothic-black)';
                } else {
                    btn.style.background = 'var(--gothic-black)';
                    btn.style.color = 'var(--gold)';
                }
            });
        }
    </script>

    <div class="contact-grid">
        <div class="contact-info">
            <h2 data-key="contactTitle"></h2>
            <p>📍 <span data-key="address"></span></p>
            <p>📞 <span data-key="phone"></span></p>
            <p>✉️ <span data-key="email"></span></p>
            <a href="https://wa.me/94727144061?text=ආයුබෝවන්" target="_blank" style="
                display: inline-flex;
                align-items: center;
                gap: 10px;
                margin-top: 12px;
                background: #25D366;
                color: white;
                padding: 10px 20px;
                border-radius: 30px;
                text-decoration: none;
                font-family: 'Times New Roman', serif;
                font-size: 1rem;
                font-weight: bold;
                box-shadow: 0 4px 12px rgba(37,211,102,0.4);
                transition: background 0.3s, transform 0.2s;
            " onmouseover="this.style.background='#1ebe5d';this.style.transform='scale(1.03)'" onmouseout="this.style.background='#25D366';this.style.transform='scale(1)'">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                <span data-key="whatsappBtn"></span>
            </a>
        </div>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3956.4795540018245!2d80.48244679999999!3d7.4120563!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ae341002b8c278d%3A0xd87611a4ad49b1b5!2sPublic%20Library%20-%20Weuda!5e0!3m2!1sen!2slk!4v1771580064038!5m2!1sen!2slk" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

    <footer>
        <span data-key="footer"></span>
    </footer>

    <script src="script.js"></script>

    <!-- ══ FLOATING NEW BOOKS BUTTON ══ -->
    <style>
        @keyframes nb-pulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(212,175,55,0.35), 0 0 0 0 rgba(212,175,55,0.45); }
            60%       { box-shadow: 0 4px 24px rgba(212,175,55,0.35), 0 0 0 10px rgba(212,175,55,0); }
        }
        @keyframes nb-bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }
        #nb-float {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            text-decoration: none;
            animation: nb-bounce 3s ease-in-out infinite;
        }
        #nb-float:hover { animation: none; transform: scale(1.06) translateY(-3px); }

        #nb-pill {
            background: linear-gradient(135deg, #d4af37 0%, #f0d060 50%, #d4af37 100%);
            color: #1a1208;
            font-family: 'Times New Roman', serif;
            font-size: 0.82rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 20px;
            border: 2px solid #b8961a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            animation: nb-pulse 2.5s ease-in-out infinite;
            transition: filter 0.2s;
            position: relative;
            overflow: hidden;
        }
        #nb-pill::before {
            content: '';
            position: absolute;
            top: 0; left: -60%;
            width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-20deg);
            animation: nb-shine 3.5s ease-in-out infinite;
        }
        @keyframes nb-shine {
            0%, 100% { left: -60%; }
            50%       { left: 120%; }
        }
        #nb-float:hover #nb-pill { filter: brightness(1.1); }

        #nb-tag {
            background: #1a1512;
            border: 1px solid #d4af37;
            border-top: none;
            color: #d4af37;
            font-family: 'Times New Roman', serif;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            padding: 3px 14px;
            border-radius: 0 0 4px 4px;
        }

        @media (max-width: 480px) {
            #nb-float { bottom: 20px; right: 16px; }
            #nb-pill  { font-size: 0.74rem; padding: 10px 14px; letter-spacing: 1px; }
        }
    </style>

    <a href="newbooks.html" id="nb-float" title="Explore New Books">
        <div id="nb-pill">
            📚 <span id="nb-label">නව පොත් ගවේෂණය කරන්න</span>
        </div>
        <div id="nb-tag">New Arrivals · 34 Books</div>
    </a>



</body>
</html>
